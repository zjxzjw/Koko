name: koko
description: "A minimalist tray tool to monitor LLM provider balances."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.4.3
  tray_manager: ^0.2.4
  dio: ^5.7.0
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.70.2
  flutter_riverpod: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
